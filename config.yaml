# ============================================================================
# REGLE 1 - Flag de chute brutale (signal d'attention)
# ============================================================================
flag_chute:
  seuil_seance_pct: -7
  seuil_drawdown_52s_pct: -20

# ============================================================================
# REGLE 2 - Signaux techniques
# ============================================================================
signaux_techniques:
  rsi_survente: 30
  rsi_surachat: 70
  seuil_proche_bas_52s_pct: 10
  flags_actifs: true

# ============================================================================
# REGLE 3 - Alarme de degradation (ACTIONS UNIQUEMENT)
# ============================================================================
degradation_actions:
  croissance_ca_min_pct:
    actif: true
    seuil: 0
  marge_nette_min_pct:
    actif: true
    seuil: 5
  dette_sur_capitaux_max:
    actif: true
    seuil: 2.0

# ============================================================================
# REGLE 4 - Evenements a venir (resultats / ex-dividende)
# ----------------------------------------------------------------------------
# Leve un flag d'attention quand un evenement approche. Utile avant un versement
# DCA : "est-ce que je verse juste avant des resultats ?". Actions uniquement
# (les ETF n'ont pas de date de resultats).
# ============================================================================
evenements:
  resultats_dans_jours: 7          # flag si resultats dans <= N jours
  exdiv_dans_jours: 7              # (affiche dans le tableau ; pas de flag par defaut)

# ============================================================================
# REGLE 5 - Revisions d'estimations (ACTIONS UNIQUEMENT) - signal AVANCE
# ----------------------------------------------------------------------------
# Regarde la REVISION des attentes futures (combien d'analystes relevent vs
# abaissent leurs estimations d'EPS sur 30 jours), plutot que le realise passe.
# Signal plus precoce d'une these qui s'effrite. Donnee via yfinance.
# ============================================================================
revisions_estimations:
  actif: true
  seuil_net_revisions_30j: 0       # alerte si (hausses - baisses) sur 30j < ce seuil

# ============================================================================
# NEWS
# ============================================================================
news:
  max_par_ticker: 10
  anciennete_max_jours: 14
